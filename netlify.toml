[build]
  base    = "frontend"
  command = "yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

# SPA fallback so client-side routes like /custom-menu don't 404 on refresh.
# Also present as public/_redirects, but this is the source of truth for Netlify.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
